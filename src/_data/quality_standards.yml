hero:
  back_link_text: "&#8592; Back to Technology"
  back_link_href: "/technology/"
  section_label: "Quality Framework"
  title: "Built to International Standards"
  subtitle: "Every stage of the NaturalDetect&trade; pipeline is designed against recognised ISO frameworks for laboratory competence, PCR methodology, and supply chain traceability."

standards:
  - image_url: "https://images.unsplash.com/photo-1581093588401-fbb62a02f120?w=600&q=80"
    image_alt: "Laboratory quality management and calibrated testing instruments"
    tag: "Laboratory Competence"
    title: "ISO/IEC 17025:2017"
    subtitle: "General Requirements for the Competence of Testing and Calibration Laboratories"
    description: "The foundation for laboratory quality. Covers personnel competence, equipment calibration, method validation, measurement uncertainty, and impartial reporting. All NaturalDetect&trade; analytical workflows are designed to satisfy 17025 requirements for documented procedures, traceability of measurements, and quality assurance of results."
  - image_url: "https://images.unsplash.com/photo-1582719471384-894fbb16e074?w=600&q=80"
    image_alt: "PCR thermal cycler instrument for molecular amplification"
    tag: "PCR Methodology"
    title: "ISO 22174:2024"
    subtitle: "Polymerase Chain Reaction (PCR) for Detection and Quantification of Microorganisms"
    description: "Defines general requirements for PCR-based detection in the food chain, including amplification protocols, positive and negative controls, and criteria for qualitative and quantitative interpretation. Our qPCR assay design, control strategy, and reporting structure align with this framework."
  - image_url: "https://images.unsplash.com/photo-1587854692152-cbe660dbde88?w=600&q=80"
    image_alt: "Sample preparation and molecular extraction workflow"
    tag: "Sample Preparation"
    title: "ISO 20837:2006 &amp; ISO 20838:2006"
    subtitle: "PCR Requirements for Sample Preparation, Amplification, and Detection"
    description: "ISO 20837 covers sample preparation to obtain PCR-compatible nucleic acids of suitable quality and quantity. ISO 20838 specifies requirements for amplification and detection in qualitative methods. Together, they ensure that extraction-through-detection workflows produce comparable, reproducible results across laboratories."
  - image_url: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=600&q=80"
    image_alt: "Supply chain shipping containers representing traceability"
    tag: "Supply Chain Traceability"
    title: "ISO 22005:2007"
    subtitle: "Traceability in the Feed and Food Chain &mdash; General Principles and System Design"
    description: "Provides the framework for tracing the flow of materials through the food chain. NaturalDetect&trade; extends this standard by embedding a molecular identity into the product itself, creating a physical traceability layer that cannot be forged through paperwork alone."
  - image_url: "https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?w=600&q=80"
    image_alt: "Scientist analysing nucleic acid extraction results"
    tag: "Nucleic Acid Analysis"
    title: "ISO 21571:2005 &amp; ISO 24276:2006"
    subtitle: "Methods of Analysis for Detection via Nucleic Acid Extraction"
    description: "Originally developed for GMO screening, these standards define best practices for nucleic acid extraction from food matrices, laboratory setup, method validation, and reporting. The same rigour applies to our marker detection: validated extraction protocols, defined performance characteristics, and fully documented test reports."
  - image_url: "https://images.unsplash.com/photo-1576086213369-97a306d36557?w=600&q=80"
    image_alt: "Real-time quantitative PCR experiment and data analysis"
    tag: "Reporting Standard"
    title: "MIQE 2.0 Guidelines"
    subtitle: "Minimum Information for Publication of Quantitative Real-Time PCR Experiments"
    description: "The scientific community's benchmark for transparent, reproducible qPCR reporting. MIQE covers experimental design, sample quality assessment, assay validation, and data analysis methodology. Our internal reporting and manuscript preparation follow MIQE 2.0 (revised 2025) to ensure every claim is independently verifiable."

commitment:
  title: "Standards Are Not Aspirational"
  description: "We do not reference ISO standards as marketing language. Each standard listed above has a direct mapping to a documented procedure in our analytical workflow. Our detection pipeline, from sample extraction through to Certificate of Analysis, is designed so that every step can be audited against these frameworks."
  cta_text: "Discuss Our Quality Framework &#8594;"
  cta_href: "/contact/"
