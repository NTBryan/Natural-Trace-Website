# Detection Methods Section
detection_label: "Analytical Capabilities"
detection_title: "Detection Methods"
detection_subtitle: "Three tiers of molecular detection to match your verification requirements, from routine screening to definitive identification."

detection_methods:
  - tier: "Basic"
    title: "Quantitative PCR"
    description: "Confirms whether your product contains the expected identity markers. A reliable, scalable way to verify that what's on the label is what's in the product."
    image_src: "/assets/images/method-qpcr.png"
    image_alt: "qPCR detection method"
    capabilities:
      - "Clear yes-or-no identity confirmation"
      - "Scalable across large batch volumes"
      - "Cost-effective routine verification"
      - "Ideal for ongoing supply chain monitoring"
  - tier: "Advanced"
    title: "Digital PCR"
    description: "Goes beyond detection to tell you exactly how much of a target marker is present. Precision counting at the molecular level for products where the detail matters."
    image_src: "/assets/images/method-dpcr.png"
    image_alt: "Digital PCR detection method"
    capabilities:
      - "Exact marker quantification, not just presence"
      - "Unmatched precision across product types"
      - "Consistent results regardless of product complexity"
      - "Elevated confidence for high-value products"
  - tier: "Premium"
    title: "DNA Sequencing"
    description: "Reads the actual genetic code of what's in your product. The most definitive level of proof available, delivering evidence that holds up under any scrutiny."
    image_src: "/assets/images/method-sequencing.png"
    image_alt: "DNA Sequencing detection method"
    capabilities:
      - "Definitive species-level proof of identity"
      - "Distinguishes between closely related species"
      - "Gold-standard evidence for regulatory submissions"
      - "The highest level of certainty available"

