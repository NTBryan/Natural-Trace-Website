questions:
  - category: general
    question: "Is NaturalTag™ approved for use in food products?"
    answer: >-
      NaturalTag™ is composed entirely of inactivated probiotic Lactobacillus
      species that are already widely used in food production. These organisms
      hold Generally Recognised as Safe (GRAS) status and are compatible with
      major regulatory frameworks. We work with each client to confirm
      compliance for their specific product category and target markets.
  - category: general
    question: "Does it meet Non-GMO requirements?"
    answer: >-
      Yes. NaturalTag™ uses naturally occurring organisms with no genetic
      modification whatsoever. It is fully compatible with Non-GMO
      certification standards and labelling requirements worldwide.
  - category: general
    question: "Which countries or regions can I use it in?"
    answer: >-
      Our probiotic-based markers use organisms with established food-safety
      status across the EU, US, APAC, and most other jurisdictions. During
      onboarding, we confirm regulatory alignment for your specific product
      and destination markets.
  - category: technical
    question: "What exactly is in the tag?"
    answer: >-
      NaturalTag™ is a precisely formulated blend of inactivated (non-living)
      probiotic markers from Lactobacillus species. The organisms are
      heat-killed before formulation. There are no synthetic chemicals, dyes,
      or foreign substances.
  - category: technical
    question: "Will it affect the taste, texture, or shelf life of my product?"
    answer: >-
      No. NaturalTag™ is applied at trace concentrations and is undetectable
      by sensory evaluation. It does not alter taste, colour, texture,
      nutritional profile, or shelf life. Independent testing confirms zero
      impact on product characteristics.
  - category: technical
    question: "Is it safe for consumers with allergies?"
    answer: >-
      NaturalTag™ contains no common allergens. The Lactobacillus species used
      are standard food-grade probiotics with extensive safety histories. We
      provide full compositional data during onboarding for your regulatory
      and allergen review.
  - category: integration
    question: "Will I need to change my manufacturing process?"
    answer: >-
      No process changes required. NaturalTag™ is formulated directly into
      your existing production workflow — it integrates at the mixing,
      blending, or formulation stage. Our team designs the integration point
      to fit your process, not the other way around.
  - category: integration
    question: "How long does onboarding take?"
    answer: >-
      Typical onboarding takes 4–6 weeks: formulation compatibility testing,
      tag-assay pairing validation, and integration into your production line.
      Pilot batches confirm everything works before full deployment.
  - category: integration
    question: "What about products with complex matrices — oils, powders, liquids?"
    answer: >-
      We have validated NaturalTag™ across multiple matrices including fresh
      produce, supplements, oils, powders, and liquids. Each product type
      receives a tailored formulation to ensure tag survival and detectability
      through processing and storage.
  - category: detection
    question: "How is the tag detected downstream?"
    answer: >-
      Detection is performed using NaturalDetect™, our molecular analytical
      pipeline. A small sample is collected at any point in the supply chain,
      the molecular signature is extracted and the tag markers are identified
      with high specificity. Results are automated — no subjective
      interpretation.
  - category: detection
    question: "Can the tag be removed, transferred, or counterfeited?"
    answer: >-
      No. Because NaturalTag™ is embedded into the product matrix during
      manufacturing, it cannot be washed off, scraped away, or transferred to
      another product. The tag-assay pairing is proprietary, making
      replication extremely difficult without access to both the formulation
      and detection system.
  - category: detection
    question: "What does a result look like?"
    answer: >-
      Each tested sample receives a clear determination: Authenticated or Not
      Authenticated. A Certificate of Analysis is generated automatically
      through NaturalCloud™, with full audit trail, signal data, and
      batch-level traceability.
  - category: commercial
    question: "How is pricing structured?"
    answer: >-
      Pricing follows a razor-and-blade model: an initial integration fee
      covers formulation and validation, then ongoing costs scale with
      production volume. We scope pricing during the feasibility phase so you
      have full clarity before committing.
  - category: commercial
    question: "Is there a minimum contract length?"
    answer: >-
      We offer flexible engagement terms. Most clients start with a pilot
      phase before moving to a longer-term agreement. Specifics depend on
      product type and volume — we discuss this early in the conversation.
  - category: commercial
    question: "What ROI can I expect?"
    answer: >-
      NaturalTag™ protects brand value, deters fraud, and provides
      evidence-grade traceability for regulatory and customer audits. Clients
      in industries facing counterfeiting, origin disputes, or compliance
      pressure see the strongest returns. We can walk through a value case
      specific to your situation.
