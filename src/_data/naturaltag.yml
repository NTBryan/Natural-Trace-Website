# Hero Section
hero_label: "Source-Level Tagging"
title: "NaturalTag™"
subtitle: "A food-grade molecular marker embedded into your product at source. Not applied after. Not added later. Formulated in. NaturalTag™ is your product's permanent molecular identity."
back_link_text: "← Back to Technology"
back_link_url: "/technology/"
hero_image_src: "/assets/logos/NT icon without logo.png"
hero_image_alt: "NaturalTag™"

hero_features:
  - num: "01"
    title: "Food-Grade Composition"
    description: "Composed entirely of inactivated probiotic organisms already used in food production"
  - num: "02"
    title: "Non-GMO"
    description: "No genetic modification. Naturally occurring organisms, regulatory-compatible worldwide"
  - num: "03"
    title: "PCR-Detectable"
    description: "Designed for detection by PCR at trace concentrations downstream"
  - num: "04"
    title: "Batch-Level Traceability"
    description: "Each production batch receives a unique marker combination for full chain-of-custody"

# Pipeline Section
pipeline_label: "How It Works"
pipeline_title: "From Source to Certainty"

pipeline_steps:
  - num: "01"
    title: "Formulate"
    description: "NaturalTag™ is formulated directly into your product during manufacturing. A blend of inactivated probiotic markers integrated at source. No process changes required."
  - num: "02"
    title: "Embed"
    description: "The molecular marker becomes part of the product matrix. It survives processing, storage, and transport. The tag cannot be removed, transferred, or counterfeited."
  - num: "03"
    title: "Verify"
    description: "At any point downstream, a sample is tested with NaturalDetect™ to confirm origin and authenticity. The tag is the proof."

